<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3대 진단 상세 설정</title>
  
  <!-- 전역 공통 변수 및 기본 초기화 스타일 불러오기 -->
  <link rel="stylesheet" href="../assets/css/variables.css">
  <!-- 본 페이지 전용 독립 스타일시트 불러오기 (HTML 파일명 기준 추출) -->
  <link rel="stylesheet" href="page03_popup.css">
</head>
<body>

  <!-- [메인 모바일 모형 래퍼] 스마트폰 화면 비율의 컨테이너 -->
  <main class="app-wrapper">
    
    <!-- 모달 배경 딤(Dim) 처리용 레이어 -->
    <div class="popup-dim-overlay"></div>

    <!-- 바텀 시트/팝업 본체 -->
    <!-- START: SECTION_1 -->
    <div class="popup-sheet-container">
      
      <!-- 1. 팝업 헤더 영역 -->
      <header class="popup-header">
        <div class="popup-header-content">
          <h2 class="popup-title">3대 진단</h2>
          <button type="button" class="btn-close-popup" aria-label="닫기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="close-icon"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </header>

      <!-- 2. 팝업 스크롤 가능한 본문 영역 -->
      <div class="popup-content">
        
        <!-- 카테고리 1: 암 -->
        <div class="popup-category-section">
          <div class="category-header">
            <span class="category-title">암</span>
          </div>
          <div class="category-divider"></div>
          
          <ul class="option-list">
            <!-- 옵션 1 (선택됨) -->
            <li class="option-item">
              <div class="popup-checkbox" data-property-1="selected">
                <div class="check-circle"></div>
                <div class="check-icon"></div>
              </div>
              <span class="option-label">암진단비</span>
            </li>
            <!-- 옵션 2 (미선택) -->
            <li class="option-item">
              <div class="popup-checkbox" data-property-1="default">
                <div class="check-circle"></div>
                <div class="check-icon"></div>
              </div>
              <span class="option-label">통합암진단비</span>
            </li>
            <!-- 옵션 3 (미선택) -->
            <li class="option-item">
              <div class="popup-checkbox" data-property-1="default">
                <div class="check-circle"></div>
                <div class="check-icon"></div>
              </div>
              <span class="option-label">암수술비</span>
            </li>
            <!-- 옵션 4 (미선택) -->
            <li class="option-item">
              <div class="popup-checkbox" data-property-1="default">
                <div class="check-circle"></div>
                <div class="check-icon"></div>
              </div>
              <span class="option-label">암주요치료비</span>
            </li>
            <!-- 옵션 5 (선택됨) -->
            <li class="option-item">
              <div class="popup-checkbox" data-property-1="selected">
                <div class="check-circle"></div>
                <div class="check-icon"></div>
              </div>
              <span class="option-label">고액항암치료비</span>
            </li>
          </ul>
        </div>

        <!-- 카테고리 2: 뇌혈관 -->
        <div class="popup-category-section">
          <div class="category-header">
            <span class="category-title">뇌혈관</span>
          </div>
          <div class="category-divider"></div>
          
          <ul class="option-list">
            <!-- 옵션 1 (미선택) -->
            <li class="option-item">
              <div class="popup-checkbox" data-property-1="default">
                <div class="check-circle"></div>
                <div class="check-icon"></div>
              </div>
              <span class="option-label">뇌혈관 진단비</span>
            </li>
            <!-- 옵션 2 (미선택) -->
            <li class="option-item">
              <div class="popup-checkbox" data-property-1="default">
                <div class="check-circle"></div>
                <div class="check-icon"></div>
              </div>
              <span class="option-label">뇌혈관 수술비</span>
            </li>
            <!-- 옵션 3 (선택됨) -->
            <li class="option-item">
              <div class="popup-checkbox" data-property-1="selected">
                <div class="check-circle"></div>
                <div class="check-icon"></div>
              </div>
              <span class="option-label">2대 주요치료비</span>
            </li>
          </ul>
        </div>

      </div>

      <!-- 3. 팝업 하단 고정 버튼 바 -->
      <footer class="popup-footer" data-type="1">
        <button type="button" class="btn-action-primary confirm-btn" data-property-1="primary" id="btn-select-confirm">
          <span>선택 (3)</span>
        </button>
      </footer>

      <!-- 4. iOS 홈 인디케이터 바 -->
      <div class="ios-home-indicator-bar" data-bg="false" data-os="iOS">
        <div class="ios-indicator-line"></div>
      </div>

    </div>
    <!-- END: SECTION_1 -->

    <!-- 구역 1 소스보기 배지 그룹 (100% 너비 툴바) -->
    <div class="section-code-badge bottom-badge">
      <span class="badge-label">팝업 소스:</span>
      <button type="button" class="btn-inspect" data-section="SECTION_1" data-type="html">HTML</button>
      <button type="button" class="btn-inspect" data-section="SECTION_1" data-type="css">CSS</button>
      <button type="button" class="btn-inspect" data-section="SECTION_1" data-type="js">JS</button>
    </div>

  </main>

  <!-- [화면 알림 레이아웃] 동적 인터랙션 작동 시 하단에 노출될 토스트 메시지 -->
  <div class="toast-message" id="page-toast">
    <span id="page-toast-text">알림 메시지</span>
  </div>

  <!-- [공통 요구사항] 소스 코드 뷰어 위젯 스크립트 연결 -->
  <script src="../assets/js/inspector.js"></script>
  <!-- 본 페이지 전용 독립 스크립트 연결 (HTML 파일명 기준 추출) -->
  <script src="page03_popup.js"></script>
</body>
</html>
